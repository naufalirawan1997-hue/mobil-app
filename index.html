<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Mobil App Online</title>

<style>
body { font-family: Arial; background:#eef2f7; padding:15px; }
.container { max-width:1000px; margin:auto; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }

input, select {
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:1px solid #ccc;
  width:calc(50% - 20px);
}

button { padding:10px; margin:5px; border:none; border-radius:6px; cursor:pointer; }
.btn-add { background:#28a745; color:white; }
.btn-hapus { background:red; color:white; }

table { width:100%; border-collapse: collapse; }
th, td { padding:10px; text-align:center; }
th { background:#333; color:white; }
</style>
</head>

<body>

<div class="container">

<h2>🚗 Mobil App (Online)</h2>

<div class="card">
<input id="merk" placeholder="Merk">
<input id="type" placeholder="Type">
<input id="tahun" type="number" placeholder="Tahun">

<select id="transmisi">
<option>Manual</option>
<option>AT</option>
<option>CVT</option>
</select>

<input id="pajak" placeholder="Pajak">
<input id="beli" placeholder="Harga Beli" onkeyup="formatInputRupiah(this)">
<input id="jual" placeholder="Harga Jual" onkeyup="formatInputRupiah(this)">
<input id="biaya" placeholder="Biaya" onkeyup="formatInputRupiah(this)">

<br>
<button class="btn-add" onclick="tambahData()">Tambah Data</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Merk</th>
<th>Type</th>
<th>Tahun</th>
<th>Transmisi</th>
<th>Beli</th>
<th>Jual</th>
<th>Profit</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
// 🔥 ISI DARI FIREBASE KAMU
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCsVH4wIx4ZG8zJPSlEfA4JTv1qqt4l26s",
  authDomain: "mobil-app-1cb44.firebaseapp.com",
  projectId: "mobil-app-1cb44",
  storageBucket: "mobil-app-1cb44.firebasestorage.app",
  messagingSenderId: "245563336447",
  appId: "1:245563336447:web:3b95bc5b52e267fb88ceca"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];

// FORMAT INPUT
function formatInputRupiah(input) {
  let angka = input.value.replace(/\D/g, "");
  input.value = angka.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function cleanNumber(str) {
  return Number(str.replace(/\./g,""));
}

function formatRupiah(angka) {
  return "Rp " + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

// TAMBAH DATA
async function tambahData() {
  let item = {
    merk: merk.value,
    type: type.value,
    tahun: Number(tahun.value),
    transmisi: transmisi.value,
    beli: cleanNumber(beli.value),
    jual: cleanNumber(jual.value),
    biaya: cleanNumber(biaya.value)
  };

  await db.collection("mobil").add(item);
}

// LOAD REALTIME 🔥
db.collection("mobil").onSnapshot(snapshot => {
  data = [];
  snapshot.forEach(doc => {
    let d = doc.data();
    d.id = doc.id;
    data.push(d);
  });
  render();
});

// RENDER
function render() {
  let table = document.getElementById("dataTable");
  table.innerHTML = "";

  data.forEach(d => {
    let profit = d.jual - d.beli - d.biaya;

    table.innerHTML += `
    <tr>
      <td>${d.merk}</td>
      <td>${d.type}</td>
      <td>${d.tahun}</td>
      <td>${d.transmisi}</td>
      <td>${formatRupiah(d.beli)}</td>
      <td>${formatRupiah(d.jual)}</td>
      <td>${formatRupiah(profit)}</td>
      <td>
        <button class="btn-hapus" onclick="hapusData('${d.id}')">Hapus</button>
      </td>
    </tr>`;
  });
}

// HAPUS
async function hapusData(id) {
  await db.collection("mobil").doc(id).delete();
}

</script>

</body>
</html>
